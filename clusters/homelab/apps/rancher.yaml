---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: rancher
  namespace: flux-system
spec:
  interval: 30m
  sourceRef:
    kind: GitRepository
    name: flux-system
  path: ./infrastructure/monitoring/rancher
  prune: true
  # Deliberately independent of `infrastructure`/`apps`:
  # - no wait:true, so Flux does not block on Rancher becoming healthy
  # - no dependsOn, so a slow/failing Rancher install never blocks business apps
  # Rancher (heavy) is a management UI; it should not gate production workloads.
