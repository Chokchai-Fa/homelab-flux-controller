---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: portainer
  namespace: flux-system
spec:
  interval: 30m
  sourceRef:
    kind: GitRepository
    name: flux-system
  path: ./infrastructure/monitoring/portainer
  prune: true
  # Deliberately independent of `infrastructure`/`apps`: no wait:true, no
  # dependsOn, so a slow or failing management-UI install never blocks
  # business apps. Portainer is lightweight (see helmrelease.yaml), but
  # there's no reason to give it the ability to block anything either.
