---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: portainer
  namespace: flux-system
spec:
  interval: 30m
  sourceRef:
    kind: GitRepository
    name: flux-system
  path: ./infrastructure/monitoring/portainer
  prune: true
  # Same isolation as rancher.yaml: no wait:true, no dependsOn, so a slow or
  # failing management-UI install never blocks business apps. Portainer is
  # much lighter than Rancher (see helmrelease.yaml for why), but there's no
  # reason to give it the ability to block `infrastructure`/`apps` either.
