---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: code-server
  namespace: flux-system
spec:
  interval: 30m
  sourceRef:
    kind: GitRepository
    name: flux-system
  path: ./infrastructure/monitoring/code-server
  prune: true
  # Deliberately independent of `infrastructure`/`apps`: no wait:true, no
  # dependsOn, same as portainer.yaml/rancher.yaml before it. code-server
  # depends on a Secret (code-server-auth) that is created directly
  # in-cluster, not by Flux - see deployment.yaml for why.
