apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: rancher
  namespace: flux-system
spec:
  # Suspended again: retried 2026-07-10 and reproduced the same failure —
  # helm install pushed node load average to ~18 on 4 cores, flapping the
  # node NotReady and crash-looping every Flux controller. Root cause is
  # CPU starvation from Rancher's install-time workload, not a fluke.
  # Needs either a much lighter install path or more CPU headroom before
  # retrying.
  suspend: true
  interval: 10m
  releaseName: rancher
  targetNamespace: cattle-system
  storageNamespace: cattle-system
  install:
    createNamespace: true
    crds: CreateReplace
    remediation:
      retries: 3
  upgrade:
    crds: CreateReplace
    remediation:
      retries: 3
  chart:
    spec:
      chart: rancher
      # Latest stable Rancher (multi-arch, supports arm64). Pin a specific
      # version here if you want reproducible upgrades.
      version: ">=2.9.0"
      sourceRef:
        kind: HelmRepository
        name: rancher-stable
        namespace: flux-system
      interval: 1h
  values:
    # External hostname served via the Cloudflare Tunnel.
    hostname: rancher.chokchai-dev.xyz

    # Cloudflare terminates TLS at the edge, so Rancher serves plain HTTP and
    # does NOT require cert-manager. The in-cluster Ingress is disabled because
    # routing is handled entirely by the cloudflared tunnel -> ClusterIP service.
    tls: external
    ingress:
      enabled: false

    # Single-node homelab: one replica, no anti-affinity spreading.
    replicas: 1
    antiAffinity: preferred

    # First-login bootstrap password (change it in the UI after first login).
    bootstrapPassword: "@Phukao98765Rancher"

    # Keep Rancher's footprint modest on the 3.7 GiB Raspberry Pi.
    resources:
      requests:
        cpu: 250m
        memory: 512Mi
      limits:
        memory: 2Gi
