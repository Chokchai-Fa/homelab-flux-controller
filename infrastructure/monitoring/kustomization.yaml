apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Monitoring and observability components

# GitOps dashboard and monitoring tools:
# - weave-gitops  # GitOps dashboard for Flux CD - DEPLOYED
# - prometheus    # Metrics collection
# - grafana       # Dashboards and visualization  
# - loki          # Log aggregation

resources:
  - weave-gitops  # GitOps dashboard for Flux CD
  # Rancher is intentionally NOT here. It is reconciled by its own top-level
  # Flux Kustomization (clusters/homelab/apps/rancher.yaml) so that a slow or
  # failing Rancher install never blocks the wait:true `infrastructure` set
  # (and therefore the business `apps`). See that file.
