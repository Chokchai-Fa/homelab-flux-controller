apiVersion: v1
kind: Service
metadata:
  name: minio-headless
  namespace: core
  labels:
    app: minio
spec:
  clusterIP: None
  selector:
    app: minio
  ports:
    - port: 9000
      name: api

---
apiVersion: v1
kind: Service
metadata:
  name: minio
  namespace: core
  labels:
    app: minio
spec:
  type: ClusterIP
  selector:
    app: minio
  ports:
    - port: 9000
      targetPort: 9000
      name: api
    - port: 9001
      targetPort: 9001
      name: console

---
apiVersion: v1
kind: Service
metadata:
  name: minio-nodeport
  namespace: core
  labels:
    app: minio
spec:
  type: NodePort
  selector:
    app: minio
  ports:
    - port: 9000
      targetPort: 9000
      nodePort: 30900
      name: api
    - port: 9001
      targetPort: 9001
      nodePort: 30901
      name: console
