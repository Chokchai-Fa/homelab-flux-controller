apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: minio
  namespace: core
  labels:
    app: minio
spec:
  serviceName: minio-headless
  replicas: 1
  selector:
    matchLabels:
      app: minio
  template:
    metadata:
      labels:
        app: minio
    spec:
      containers:
        - name: minio
          image: minio/minio:RELEASE.2025-04-22T22-12-26Z
          imagePullPolicy: IfNotPresent
          args:
            - server
            - /data
            - --console-address
            - :9001
          env:
            # minio-auth is created directly in-cluster (kubectl create
            # secret) and deliberately NOT committed to git.
            - name: MINIO_ROOT_USER
              valueFrom:
                secretKeyRef:
                  name: minio-auth
                  key: username
            - name: MINIO_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: minio-auth
                  key: password
            # The console signs presigned/share URLs for MINIO_SERVER_URL, so
            # it must be the public S3 hostname - but console traffic to it
            # must NOT loop out through Cloudflare, whose proxy breaks
            # aws-chunked signatures ("XML not well-formed"). A CoreDNS
            # rewrite (see networking/coredns) hairpins this hostname to the
            # minio service in-cluster, and it's http on purpose: SigV4
            # ignores the scheme, so swapping http->https on the public link
            # keeps the signature valid while the console reaches port 80
            # directly.
            - name: MINIO_SERVER_URL
              value: http://s3.chokchai-dev.xyz
            - name: MINIO_BROWSER_REDIRECT_URL
              value: https://minio.chokchai-dev.xyz
          ports:
            - containerPort: 9000
              name: api
            - containerPort: 9001
              name: console
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /minio/health/live
              port: 9000
            initialDelaySeconds: 30
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /minio/health/ready
              port: 9000
            initialDelaySeconds: 10
            periodSeconds: 10
          volumeMounts:
            - name: minio-data
              mountPath: /data
  volumeClaimTemplates:
    - metadata:
        name: minio-data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 10Gi
        storageClassName: local-path
