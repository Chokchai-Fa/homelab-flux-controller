apiVersion: v1
kind: Service
metadata:
  name: nats
  namespace: core
spec:
  selector:
    app: nats
  ports:
    - port: 4222
      targetPort: 4222
      name: client
    - port: 8222
      targetPort: 8222
      name: monitor
---
apiVersion: v1
kind: Service
metadata:
  name: nats-nodeport
  namespace: core
  labels:
    app: nats
spec:
  type: NodePort
  selector:
    app: nats
  ports:
    - port: 4222
      targetPort: 4222
      nodePort: 30422
      name: client
