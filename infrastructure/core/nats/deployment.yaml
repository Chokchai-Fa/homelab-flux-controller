apiVersion: apps/v1
kind: Deployment
metadata:
  name: nats
  namespace: core
  labels:
    app: nats
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nats
  template:
    metadata:
      labels:
        app: nats
    spec:
      containers:
        - name: nats
          image: nats:2.10-alpine
          # Core NATS only - no JetStream/-js flag, so pub/sub state lives in
          # memory and is never written to disk. No PVC on purpose.
          args:
            - "-c"
            - "/etc/nats/nats-server.conf"
          env:
            # nats-auth is created directly in-cluster (kubectl create
            # secret) and deliberately NOT committed to git - see
            # configmap.yaml for why.
            - name: NATS_USER
              valueFrom:
                secretKeyRef:
                  name: nats-auth
                  key: username
            - name: NATS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: nats-auth
                  key: password
          ports:
            - containerPort: 4222
              name: client
            - containerPort: 8222
              name: monitor
          volumeMounts:
            - name: config
              mountPath: /etc/nats/nats-server.conf
              subPath: nats-server.conf
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              memory: 256Mi
      volumes:
        - name: config
          configMap:
            name: nats-config
