apiVersion: apps/v1
kind: Deployment
metadata:
  name: nats
  namespace: core
  labels:
    app: nats
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nats
  template:
    metadata:
      labels:
        app: nats
    spec:
      containers:
        - name: nats
          image: nats:2.10-alpine
          # Core NATS only - no JetStream/-js flag, so pub/sub state lives in
          # memory and is never written to disk. No PVC on purpose.
          args:
            - "-m"
            - "8222"
          ports:
            - containerPort: 4222
              name: client
            - containerPort: 8222
              name: monitor
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              memory: 256Mi
