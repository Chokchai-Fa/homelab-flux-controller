apiVersion: v1
kind: ConfigMap
metadata:
  name: cloudflared-config
  namespace: ingress
data:
  tunnel-config.yml: |
    # Note: credentials-file is mounted from host filesystem via hostPath volume
    tunnel: 1
    credentials-file: /etc/cloudflared/credentials.json

    ingress:
      - hostname: portfolio.chokchai-dev.xyz
        # Routes to portfolio-web service in default namespace
        service: http://portfolio-web.default.svc.cluster.local:3000

      - hostname: weaver-gitops.chokchai-dev.xyz
        # Routes to weave-gitops service in flux-system namespace
        service: http://weave-gitops.flux-system.svc.cluster.local:9001

      - hostname: line-webhook.chokchai-dev.xyz
        # Routes to line-webhook service in default namespace
        service: http://line-webhook.default.svc.cluster.local:8080

      - hostname: portainer.chokchai-dev.xyz
        # Routes to Portainer UI in portainer namespace (TLS terminated by Cloudflare)
        service: http://portainer.portainer.svc.cluster.local:9000

      - hostname: codeserver.chokchai-dev.xyz
        # Routes to code-server IDE in code-server namespace (TLS terminated by Cloudflare)
        service: http://code-server.code-server.svc.cluster.local:8080

      - hostname: nats.chokchai-dev.xyz
        # NATS monitoring/varz dashboard (HTTP) in core namespace
        service: http://nats.core.svc.cluster.local:8222

      # Catch-all for any other requests
      - service: http_status:404
