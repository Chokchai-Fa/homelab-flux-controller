apiVersion: apps/v1
kind: Deployment
metadata:
  name: consumer-reply-line-user
  namespace: default
  labels:
    app: consumer-reply-line-user
spec:
  replicas: 1
  selector:
    matchLabels:
      app: consumer-reply-line-user
  template:
    metadata:
      labels:
        app: consumer-reply-line-user
    spec:
      containers:
      - name: consumer-reply-line-user
        image: chokchaifa/consumer-reply-line-user:v1.0.0-0.placeholder # {"$imagepolicy": "flux-system:consumer-reply-line-user"}
        ports:
        - containerPort: 8080
          name: http
          protocol: TCP
        env:
        - name: NATS_URL
          value: nats://nats.core.svc.cluster.local:4222
        # nats-auth (copied into default) and line-webhook-secret are created
        # directly in-cluster (kubectl create secret) and deliberately NOT
        # committed to git.
        - name: NATS_USER
          valueFrom:
            secretKeyRef:
              name: nats-auth
              key: username
        - name: NATS_PASSWORD
          valueFrom:
            secretKeyRef:
              name: nats-auth
              key: password
        - name: LINE_CHANNEL_SECRET
          valueFrom:
            secretKeyRef:
              name: line-webhook-secret
              key: LINE_CHANNEL_SECRET
        - name: LINE_CHANNEL_ACCESS_TOKEN
          valueFrom:
            secretKeyRef:
              name: line-webhook-secret
              key: LINE_CHANNEL_ACCESS_TOKEN
        resources:
          limits:
            cpu: 300m
            memory: 256Mi
          requests:
            cpu: 100m
            memory: 64Mi
        livenessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 20
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 5
      restartPolicy: Always
