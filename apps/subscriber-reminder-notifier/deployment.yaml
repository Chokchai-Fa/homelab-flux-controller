apiVersion: apps/v1
kind: Deployment
metadata:
  name: subscriber-reminder-notifier
  namespace: default
  labels:
    app: subscriber-reminder-notifier
spec:
  replicas: 1
  selector:
    matchLabels:
      app: subscriber-reminder-notifier
  template:
    metadata:
      labels:
        app: subscriber-reminder-notifier
    spec:
      containers:
        - name: subscriber-reminder-notifier
          image: chokchaifa/subscriber-reminder-notifier:v1.0.0-25.3cfe245 # {"$imagepolicy": "flux-system:subscriber-reminder-notifier"}
          env:
            # nats-auth, redis-auth are copied into the default namespace
            # directly in-cluster (kubectl create secret) and deliberately
            # NOT committed to git. DATABASE_URL reuses
            # consumer-llm-processor-secret.
            - name: NATS_URL
              value: nats://nats.core.svc.cluster.local:4222
            - name: NATS_USER
              valueFrom:
                secretKeyRef:
                  name: nats-auth
                  key: username
            - name: NATS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: nats-auth
                  key: password
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: consumer-llm-processor-secret
                  key: DATABASE_URL
            - name: REDIS_ADDR
              value: redis.core.svc.cluster.local:6379
            - name: REDIS_USERNAME
              valueFrom:
                secretKeyRef:
                  name: redis-auth
                  key: username
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: redis-auth
                  key: password
          resources:
            limits:
              cpu: 100m
              memory: 64Mi
            requests:
              cpu: 20m
              memory: 32Mi
      restartPolicy: Always
