apiVersion: apps/v1
kind: Deployment
metadata:
  name: consumer-llm-processor
  namespace: default
  labels:
    app: consumer-llm-processor
spec:
  replicas: 1
  selector:
    matchLabels:
      app: consumer-llm-processor
  template:
    metadata:
      labels:
        app: consumer-llm-processor
    spec:
      containers:
      - name: consumer-llm-processor
        image: chokchaifa/consumer-llm-processor:v1.0.0-0.placeholder # {"$imagepolicy": "flux-system:consumer-llm-processor"}
        ports:
        - containerPort: 8080
          name: http
          protocol: TCP
        env:
        - name: NATS_URL
          value: nats://nats.core.svc.cluster.local:4222
        # nats-auth (copied into default), redis-auth (copied into default)
        # and consumer-llm-processor-secret are created directly in-cluster
        # (kubectl create secret) and deliberately NOT committed to git.
        - name: NATS_USER
          valueFrom:
            secretKeyRef:
              name: nats-auth
              key: username
        - name: NATS_PASSWORD
          valueFrom:
            secretKeyRef:
              name: nats-auth
              key: password
        - name: GEMINI_API_KEY
          valueFrom:
            secretKeyRef:
              name: consumer-llm-processor-secret
              key: GEMINI_API_KEY
        - name: GEMINI_MODEL
          value: gemini-3.5-flash
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: consumer-llm-processor-secret
              key: DATABASE_URL
        - name: REDIS_ADDR
          value: redis.core.svc.cluster.local:6379
        - name: REDIS_USERNAME
          valueFrom:
            secretKeyRef:
              name: redis-auth
              key: username
        - name: REDIS_PASSWORD
          valueFrom:
            secretKeyRef:
              name: redis-auth
              key: password
        resources:
          limits:
            cpu: 300m
            memory: 256Mi
          requests:
            cpu: 100m
            memory: 64Mi
        livenessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 20
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 5
      restartPolicy: Always
