apiVersion: apps/v1
kind: Deployment
metadata:
  name: consumer-llm-processor
  namespace: default
  labels:
    app: consumer-llm-processor
spec:
  replicas: 1
  selector:
    matchLabels:
      app: consumer-llm-processor
  template:
    metadata:
      labels:
        app: consumer-llm-processor
    spec:
      # Cluster DNS (via the node's upstream) intermittently SERVFAILs for
      # external names; fall back to a public resolver so Gemini API calls
      # survive the blips. 10.43.0.10 = kube-dns, tried first.
      dnsPolicy: "None"
      dnsConfig:
        nameservers:
          - 10.43.0.10
          - 1.1.1.1
        searches:
          - default.svc.cluster.local
          - svc.cluster.local
          - cluster.local
        options:
          - name: ndots
            value: "5"
      containers:
        - name: consumer-llm-processor
          image: chokchaifa/consumer-llm-processor:v1.0.3-18.592fbc2 # {"$imagepolicy": "flux-system:consumer-llm-processor"}
          env:
            - name: NATS_URL
              value: nats://nats.core.svc.cluster.local:4222
            # nats-auth (copied into default), redis-auth (copied into default)
            # and consumer-llm-processor-secret are created directly in-cluster
            # (kubectl create secret) and deliberately NOT committed to git.
            - name: NATS_USER
              valueFrom:
                secretKeyRef:
                  name: nats-auth
                  key: username
            - name: NATS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: nats-auth
                  key: password
            - name: GEMINI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: consumer-llm-processor-secret
                  key: GEMINI_API_KEY
            - name: GEMINI_MODEL
              value: gemini-3.1-flash-lite
            # Optional free-tier providers for the difficulty router; the
            # service runs on Gemini alone until these keys are added to
            # consumer-llm-processor-secret (kubectl patch/create, not git).
            - name: GROQ_API_KEY
              valueFrom:
                secretKeyRef:
                  name: consumer-llm-processor-secret
                  key: GROQ_API_KEY
                  optional: true
            - name: OPENROUTER_API_KEY
              valueFrom:
                secretKeyRef:
                  name: consumer-llm-processor-secret
                  key: OPENROUTER_API_KEY
                  optional: true
            # OpenRouter's :free lineup rotates (deepseek-r1:free died
            # 2026-07); when this 404s in the logs, pick a replacement from
            # https://openrouter.ai/api/v1/models (ids ending in :free).
            - name: OPENROUTER_MODEL
              value: nvidia/nemotron-3-ultra-550b-a55b:free
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: consumer-llm-processor-secret
                  key: DATABASE_URL
            - name: REDIS_ADDR
              value: redis.core.svc.cluster.local:6379
            - name: REDIS_USERNAME
              valueFrom:
                secretKeyRef:
                  name: redis-auth
                  key: username
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: redis-auth
                  key: password
          resources:
            limits:
              cpu: 300m
              memory: 256Mi
            requests:
              cpu: 100m
              memory: 64Mi
      restartPolicy: Always
