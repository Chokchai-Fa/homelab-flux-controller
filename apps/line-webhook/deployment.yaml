apiVersion: apps/v1
kind: Deployment
metadata:
  name: line-webhook
  namespace: default
  labels:
    app: line-webhook
spec:
  replicas: 1
  selector:
    matchLabels:
      app: line-webhook
  template:
    metadata:
      labels:
        app: line-webhook
    spec:
      containers:
      - name: line-webhook
        image: chokchaifa/line-webhook:v1.3.0-22.f408432 # {"$imagepolicy": "flux-system:line-webhook"}
        ports:
        - containerPort: 8080
          name: http
          protocol: TCP
        envFrom:
        - configMapRef:
            name: line-webhook-config
        env:
        - name: LINE_CHANNEL_SECRET
          valueFrom:
            secretKeyRef:
              name: line-webhook-secret
              key: LINE_CHANNEL_SECRET
        - name: LINE_CHANNEL_ACCESS_TOKEN
          valueFrom:
            secretKeyRef:
              name: line-webhook-secret
              key: LINE_CHANNEL_ACCESS_TOKEN
        - name: NATS_URL
          value: nats://nats.core.svc.cluster.local:4222
        # nats-auth is copied into the default namespace directly in-cluster
        # (kubectl create secret) and deliberately NOT committed to git.
        - name: NATS_USER
          valueFrom:
            secretKeyRef:
              name: nats-auth
              key: username
        - name: NATS_PASSWORD
          valueFrom:
            secretKeyRef:
              name: nats-auth
              key: password
        - name: AI_PREFIX
          value: /ai
        - name: AI_SESSION_TTL
          value: 10m
        # Images sent during an AI session are downloaded from LINE and
        # stashed in Redis (NATS message size caps rule out sending bytes
        # directly) until consumer-llm-processor picks them up.
        - name: IMAGE_TTL
          value: 10m
        # AI session state lives in Redis with a sliding TTL so "/ai" opens a
        # session and it auto-ends after 10 minutes of silence. redis-auth is
        # copied into the default namespace in-cluster, not committed to git.
        - name: REDIS_ADDR
          value: redis.core.svc.cluster.local:6379
        - name: REDIS_USERNAME
          valueFrom:
            secretKeyRef:
              name: redis-auth
              key: username
        - name: REDIS_PASSWORD
          valueFrom:
            secretKeyRef:
              name: redis-auth
              key: password
        resources:
          limits:
            cpu: 300m
            memory: 256Mi
          requests:
            cpu: 100m
            memory: 64Mi
        livenessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 20
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 5
      restartPolicy: Always
