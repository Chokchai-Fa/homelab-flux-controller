apiVersion: apps/v1
kind: Deployment
metadata:
  name: consumer-reminder
  namespace: default
  labels:
    app: consumer-reminder
spec:
  replicas: 1
  selector:
    matchLabels:
      app: consumer-reminder
  template:
    metadata:
      labels:
        app: consumer-reminder
    spec:
      containers:
        - name: consumer-reminder
          image: chokchaifa/consumer-reminder:v1.1.0-40.14b353b # {"$imagepolicy": "flux-system:consumer-reminder"}
          env:
            - name: NATS_URL
              value: nats://nats.core.svc.cluster.local:4222
            # nats-auth, redis-auth are copied into the default namespace
            # directly in-cluster (kubectl create secret) and deliberately
            # NOT committed to git. DATABASE_URL reuses
            # consumer-llm-processor-secret - both services share the same
            # Postgres instance (consumer-reminder owns line_users +
            # reminders; consumer-llm-processor owns line_ai_messages).
            - name: NATS_USER
              valueFrom:
                secretKeyRef:
                  name: nats-auth
                  key: username
            - name: NATS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: nats-auth
                  key: password
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: consumer-llm-processor-secret
                  key: DATABASE_URL
            - name: REDIS_ADDR
              value: redis.core.svc.cluster.local:6379
            - name: REDIS_USERNAME
              valueFrom:
                secretKeyRef:
                  name: redis-auth
                  key: username
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: redis-auth
                  key: password
          resources:
            limits:
              cpu: 200m
              memory: 128Mi
            requests:
              cpu: 50m
              memory: 64Mi
      restartPolicy: Always
